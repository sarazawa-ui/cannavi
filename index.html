<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>キャンナビ - スマートな履修選び</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- パスワード保護モーダル -->
  <div id="password-modal" class="password-modal">
    <div class="password-modal-content">
      <h1>キャンナビ</h1>
      <p class="password-modal-subtitle">パスワードを入力してください</p>
      <input type="password" id="password-input" class="password-input" placeholder="パスワード">
      <button id="password-submit" class="password-submit">ログイン</button>
      <div id="password-error" class="password-error"></div>
    </div>
  </div>

  <div id="app"></div>

  <script type="module" src="js/data.js"></script>
  <script type="module" src="js/router.js"></script>
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/pages.js"></script>
  <script type="module" src="js/app.js"></script>
  <script src="js/password.js"></script>
</body>
</html>
